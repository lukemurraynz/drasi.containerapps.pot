# =============================================================================
# Profiler Reaction - Performance Analysis
# =============================================================================
#
# The profiler reaction measures and reports query performance metrics.
# Use this for:
# - Understanding query execution characteristics
# - Identifying performance bottlenecks
# - Capacity planning
# - Performance regression testing
#
# Configuration options:
# - windowSize: Number of samples in the observation window (default: 100)
# - reportIntervalSecs: Seconds between performance reports (default: 60)
#
# The profiler tracks:
# - Event throughput (events/second)
# - Processing latency
# - Memory usage patterns
# - Query execution statistics
#
# Run with: cargo run -- --config examples/configs/03-reactions/profiler-performance.yaml
#
# View performance reports in the console output.

apiVersion: drasi.io/v1
id: profiler-demo
host: "0.0.0.0"
port: 8080
logLevel: info
persistConfig: false
autoInstallPlugins: true
plugins:
  - ref: source/mock
  - ref: reaction/log
  - ref: reaction/profiler

sources:
  # Fast-generating source for performance testing
  # Generic mock data: value (int), message (string), timestamp
  - kind: mock
    id: high-volume
    autoStart: true
    dataType:
      type: generic
    intervalMs: 100

queries:
  # Simple pass-through query
  - id: simple-query
    autoStart: true
    query: |
      MATCH (g:Generic)
      RETURN g.value AS Value, g.message AS Message
    queryLanguage: Cypher
    sources:
      - sourceId: high-volume

  # Filtered query (positive values only)
  - id: filtered-query
    autoStart: true
    query: |
      MATCH (g:Generic)
      WHERE g.value > 0
      RETURN g.value AS Value, g.timestamp AS Timestamp
    queryLanguage: Cypher
    sources:
      - sourceId: high-volume

  # Aggregation query (more compute intensive)
  - id: aggregation-query
    autoStart: true
    query: |
      MATCH (g:Generic)
      RETURN count(g) AS Count, avg(g.value) AS Average
    queryLanguage: Cypher
    sources:
      - sourceId: high-volume

reactions:
  # Profiler reaction for performance analysis
  - kind: profiler
    id: performance-profiler
    queries:
      - simple-query
      - filtered-query
      - aggregation-query
    autoStart: true
    windowSize: 200
    reportIntervalSecs: 30

  # Optional: Log reaction to see actual results
  - kind: log
    id: sample-output
    queries:
      - aggregation-query
    autoStart: true
    defaultTemplate:
      updated:
        template: "[STATS] Count={{after.Count}} Average={{after.Average}}"
